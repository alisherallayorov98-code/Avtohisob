name: CI/CD — AutoHisob

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── Lint & Type Check ──────────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dir: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: ${{ matrix.dir }}/package-lock.json

      - name: Install deps — ${{ matrix.dir }}
        run: cd ${{ matrix.dir }} && npm ci

      - name: Type check — ${{ matrix.dir }}
        run: cd ${{ matrix.dir }} && npx tsc --noEmit

  # ─── Backend Tests ──────────────────────────────────────────────────────────
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: avtohisob_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/avtohisob_test
      JWT_SECRET: test-jwt-secret-32-chars-minimum!
      JWT_REFRESH_SECRET: test-refresh-secret-32-chars!!
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: npm, cache-dependency-path: backend/package-lock.json }

      - name: Install deps
        run: cd backend && npm ci

      - name: Generate Prisma client
        run: cd backend && npx prisma generate

      - name: Run migrations
        run: cd backend && npx prisma migrate deploy

      - name: Run tests
        run: cd backend && npm test --if-present

  # ─── Deploy to Production ───────────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [lint, test-backend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://avtohisob.uz

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          command_timeout: 30m
          script: |
            set -e
            cd /home/alisher/Avtohisob

            # Pull latest code
            git pull origin main

            # Disk holatini log uchun ko'rsatish
            df -h /home | tail -n 1

            # Backend: install, migrate, build, restart
            cd backend
            # Toza install — oldingi yarim o'rnatilgan node_modules qoldiqlarini tozalash
            rm -rf node_modules
            npm ci --no-audit --no-fund

            # Pre-migrate DB snapshot (forensics — data-loss incidentlarini aniqlash uchun)
            echo "📊 Pre-migrate snapshot:"
            npm run db:snapshot || echo "⚠️  snapshot skipped"

            npx prisma migrate deploy

            # Post-migrate DB snapshot — agar migratsiya ma'lumotga ta'sir qilsa darhol ko'rinadi
            echo "📊 Post-migrate snapshot:"
            npm run db:snapshot || echo "⚠️  snapshot skipped"

            npm run build
            pm2 restart avtohisob-backend
            cd ..

            # Frontend: build and copy to nginx root
            cd frontend
            rm -rf node_modules
            npm ci --no-audit --no-fund
            # tsc binary ba'zan tar extraction warning tufayli yetib kelmaydi — tekshirib retry qilamiz
            if [ ! -x node_modules/.bin/tsc ]; then
              echo "⚠️  tsc topilmadi — npm cache tozalanib qaytadan o'rnatiladi"
              rm -rf node_modules
              npm cache clean --force
              npm ci --no-audit --no-fund
            fi
            [ -x node_modules/.bin/tsc ] || { echo "❌ tsc install qilinmadi"; exit 1; }
            npm run build
            cd ..

            # Nginx: /uploads/ proxy mavjudligini tekshirish va qo'shish
            NGINX_CONF=""
            for f in /etc/nginx/sites-enabled/avtohisob /etc/nginx/sites-enabled/default /etc/nginx/conf.d/avtohisob.conf; do
              [ -f "$f" ] && NGINX_CONF="$f" && break
            done
            if [ -n "$NGINX_CONF" ] && ! grep -q 'location /uploads/' "$NGINX_CONF"; then
              echo "🔧 Nginx /uploads/ proxy qo'shilmoqda..."
              cp "$NGINX_CONF" "${NGINX_CONF}.bak"
              if grep -q 'location /api/' "$NGINX_CONF"; then
                sed -i '/location \/api\//i\    location \/uploads\/ {\n        proxy_pass http:\/\/localhost:3001;\n        proxy_set_header Host $host;\n        expires 7d;\n    }\n' "$NGINX_CONF"
              fi
              nginx -t && nginx -s reload && echo "✅ Nginx /uploads/ proxy qo'shildi" || (cp "${NGINX_CONF}.bak" "$NGINX_CONF" && echo "⚠️  Nginx patch xato — backup tiklandi")
            else
              echo "✅ Nginx /uploads/ proxy allaqachon bor"
            fi

            echo "✅ Deployment complete — $(date)"
