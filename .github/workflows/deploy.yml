name: CI/CD — AutoHisob

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── Lint & Type Check ──────────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dir: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: ${{ matrix.dir }}/package-lock.json

      - name: Install deps — ${{ matrix.dir }}
        run: cd ${{ matrix.dir }} && npm ci

      - name: Type check — ${{ matrix.dir }}
        run: cd ${{ matrix.dir }} && npx tsc --noEmit

  # ─── Backend Tests ──────────────────────────────────────────────────────────
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: avtohisob_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/avtohisob_test
      JWT_SECRET: test-jwt-secret-32-chars-minimum!
      JWT_REFRESH_SECRET: test-refresh-secret-32-chars!!
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: npm, cache-dependency-path: backend/package-lock.json }

      - name: Install deps
        run: cd backend && npm ci

      - name: Generate Prisma client
        run: cd backend && npx prisma generate

      - name: Run migrations
        run: cd backend && npx prisma migrate deploy

      - name: Run tests
        run: cd backend && npm test --if-present

  # ─── Deploy to Production ───────────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [lint, test-backend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://avtohisob.uz

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd /var/www/Avtohisob

            # Pull latest code
            git pull origin main

            # Backend: install, migrate, build, restart
            cd backend
            npm ci

            # Pre-migrate DB snapshot (forensics — data-loss incidentlarini aniqlash uchun)
            echo "📊 Pre-migrate snapshot:"
            npm run db:snapshot || echo "⚠️  snapshot skipped"

            npx prisma migrate deploy

            # Post-migrate DB snapshot — agar migratsiya ma'lumotga ta'sir qilsa darhol ko'rinadi
            echo "📊 Post-migrate snapshot:"
            npm run db:snapshot || echo "⚠️  snapshot skipped"

            npm run build
            pm2 restart avtohisob-backend
            cd ..

            # Frontend: build and copy to nginx root
            cd frontend
            npm ci
            npm run build
            cd ..

            echo "✅ Deployment complete — $(date)"
