name: CI/CD — AutoHisob

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── Lint & Type Check ──────────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dir: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: ${{ matrix.dir }}/package-lock.json

      - name: Install deps — ${{ matrix.dir }}
        run: cd ${{ matrix.dir }} && npm ci

      - name: Type check — ${{ matrix.dir }}
        run: cd ${{ matrix.dir }} && npx tsc --noEmit

  # ─── Backend Tests ──────────────────────────────────────────────────────────
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: avtohisob_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/avtohisob_test
      JWT_SECRET: test-jwt-secret-32-chars-minimum!
      JWT_REFRESH_SECRET: test-refresh-secret-32-chars!!
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: npm, cache-dependency-path: backend/package-lock.json }

      - name: Install deps
        run: cd backend && npm ci

      - name: Generate Prisma client
        run: cd backend && npx prisma generate

      - name: Run migrations
        run: cd backend && npx prisma migrate deploy

      - name: Run tests
        run: cd backend && npm test --if-present

  # ─── Deploy to Production ───────────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [lint, test-backend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://avtohisob.uz

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          CARE_BOT_TOKEN: ${{ secrets.CARE_BOT_TOKEN }}
          DRIVER_BOT_TOKEN: ${{ secrets.DRIVER_BOT_TOKEN }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          command_timeout: 30m
          envs: CARE_BOT_TOKEN,DRIVER_BOT_TOKEN
          script: |
            set -e
            cd /home/alisher/Avtohisob

            echo "🔄 [1/6] Kod yangilanmoqda..."
            git pull origin main

            # ── .env: CARE_BOT_TOKEN (GitHub Secret'dan, berilgan bo'lsa) ────────
            if [ -n "$CARE_BOT_TOKEN" ]; then
              if grep -q '^CARE_BOT_TOKEN=' backend/.env 2>/dev/null; then
                sed -i "s|^CARE_BOT_TOKEN=.*|CARE_BOT_TOKEN=$CARE_BOT_TOKEN|" backend/.env
              else
                echo "CARE_BOT_TOKEN=$CARE_BOT_TOKEN" >> backend/.env
              fi
              echo "✅ CARE_BOT_TOKEN .env ga yozildi"
            fi

            # ── .env: DRIVER_BOT_TOKEN (yakka haydovchi boti — GitHub Secret'dan) ──
            if [ -n "$DRIVER_BOT_TOKEN" ]; then
              if grep -q '^DRIVER_BOT_TOKEN=' backend/.env 2>/dev/null; then
                sed -i "s|^DRIVER_BOT_TOKEN=.*|DRIVER_BOT_TOKEN=$DRIVER_BOT_TOKEN|" backend/.env
              else
                echo "DRIVER_BOT_TOKEN=$DRIVER_BOT_TOKEN" >> backend/.env
              fi
              echo "✅ DRIVER_BOT_TOKEN .env ga yozildi"
            fi

            echo "💾 Disk holati:"
            df -h /home | tail -n 1

            # ── BACKEND ────────────────────────────────────────────────────────
            echo "📦 [2/6] Backend — paketlar o'rnatilmoqda..."
            cd backend

            # package-lock.json o'zgarmagan bo'lsa node_modules saqlab qolinadi
            if [ -f node_modules/.package-lock.json ]; then
              LOCK_CACHED=$(md5sum node_modules/.package-lock.json 2>/dev/null | awk '{print $1}')
              LOCK_NEW=$(md5sum package-lock.json | awk '{print $1}')
              if [ "$LOCK_CACHED" = "$LOCK_NEW" ]; then
                echo "✅ node_modules o'zgarmagan — skip npm ci"
              else
                echo "🔄 package-lock.json o'zgardi — npm ci qayta o'tkazilmoqda"
                rm -rf node_modules
                npm ci --no-audit --no-fund
              fi
            else
              echo "🆕 node_modules yo'q — npm ci o'rnatilmoqda"
              rm -rf node_modules
              npm ci --no-audit --no-fund
            fi

            echo "🔑 [3/6] Prisma generate..."
            npx prisma generate

            echo "🗄️ [3/6] DB migratsiyalar qo'llanilmoqda..."
            echo "📊 Pre-migrate snapshot:"
            npm run db:snapshot 2>/dev/null || echo "⚠️  snapshot skipped"
            npx prisma migrate deploy
            echo "📊 Post-migrate snapshot:"
            npm run db:snapshot 2>/dev/null || echo "⚠️  snapshot skipped"

            echo "🏗️ [4/6] Backend build..."
            npm run build

            echo "🔁 PM2 qayta ishga tushirilmoqda..."
            pm2 restart avtohisob-backend --update-env
            cd ..

            # ── FRONTEND ───────────────────────────────────────────────────────
            echo "🎨 [5/6] Frontend — paketlar o'rnatilmoqda..."
            cd frontend

            if [ -f node_modules/.package-lock.json ]; then
              LOCK_CACHED=$(md5sum node_modules/.package-lock.json 2>/dev/null | awk '{print $1}')
              LOCK_NEW=$(md5sum package-lock.json | awk '{print $1}')
              if [ "$LOCK_CACHED" = "$LOCK_NEW" ]; then
                echo "✅ node_modules o'zgarmagan — skip npm ci"
              else
                echo "🔄 package-lock.json o'zgardi — npm ci qayta o'tkazilmoqda"
                rm -rf node_modules
                npm ci --no-audit --no-fund
              fi
            else
              echo "🆕 node_modules yo'q — npm ci o'rnatilmoqda"
              rm -rf node_modules
              npm ci --no-audit --no-fund
            fi

            npm run build
            cd ..

            # ── LANDING ────────────────────────────────────────────────────────
            # Landing endi React ichida (frontend/src/pages/Landing.tsx) — '/' route'da
            # auth bo'lmaganlarga ko'rsatiladi. Static landing.html ishlatilmaydi.
            # robots/sitemap SEO uchun dist'ga ko'chiriladi.
            [ -f landing/robots.txt ]  && cp landing/robots.txt   frontend/dist/robots.txt
            [ -f landing/sitemap.xml ] && cp landing/sitemap.xml  frontend/dist/sitemap.xml

            # ── NGINX ──────────────────────────────────────────────────────────
            NGINX_CONF=""
            for f in /etc/nginx/sites-enabled/avtohisob /etc/nginx/sites-enabled/default /etc/nginx/conf.d/avtohisob.conf; do
              [ -f "$f" ] && NGINX_CONF="$f" && break
            done

            if [ -n "$NGINX_CONF" ] && ! grep -q 'location /uploads/' "$NGINX_CONF"; then
              sudo cp "$NGINX_CONF" "${NGINX_CONF}.bak" 2>/dev/null && \
              sudo sed -i '/location \/api\//i\    location \/uploads\/ {\n        proxy_pass http:\/\/localhost:3001;\n        proxy_set_header Host $host;\n        expires 7d;\n    }\n' "$NGINX_CONF" 2>/dev/null && \
              sudo nginx -t 2>/dev/null && sudo nginx -s reload 2>/dev/null && \
              echo "✅ Nginx /uploads/ proxy qo'shildi" || \
              echo "⚠️  Nginx /uploads/ — sudo NOPASSWD sozlanmagan, qo'lda qo'shing"
            fi

            # Eski 'location = / → landing.html' qoidasi bo'lsa olib tashlaymiz
            # (React Landing '/' route'ni egallashi uchun — SPA fallback kerak)
            if [ -n "$NGINX_CONF" ] && grep -q 'try_files /landing.html' "$NGINX_CONF"; then
              sudo cp "$NGINX_CONF" "${NGINX_CONF}.nolanding.bak" 2>/dev/null && \
              sudo sed -i '/location = \/ { try_files \/landing.html =404; }/d' "$NGINX_CONF" 2>/dev/null && \
              sudo nginx -t 2>/dev/null && sudo nginx -s reload 2>/dev/null && \
              echo "✅ Eski nginx landing qoidasi olib tashlandi" || \
              echo "⚠️  Nginx landing qoidasi — qo'lda olib tashlang"
            fi

            # ── HEALTH CHECK ───────────────────────────────────────────────────
            echo "🏥 [6/6] Backend health check..."
            sleep 4
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3001/health 2>/dev/null || echo "000")
            if [ "$HTTP_STATUS" = "200" ]; then
              echo "✅ Backend ishlayapti (HTTP $HTTP_STATUS)"
            else
              echo "⚠️  Backend javob bermayapti (HTTP $HTTP_STATUS) — PM2 loglarni tekshiring:"
              pm2 logs avtohisob-backend --lines 20 --nostream 2>/dev/null || true
            fi

            echo ""
            echo "✅ Deploy muvaffaqiyatli — $(date '+%Y-%m-%d %H:%M:%S %Z')"
            echo "🌐 https://avtohisob.uz"
