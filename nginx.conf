user www-data;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
  use epoll;
  multi_accept on;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  # Logging
  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for"';
  access_log /var/log/nginx/access.log main;

  # Performance
  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  client_max_body_size 20m;

  # Security headers
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

  # Gzip
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types text/plain text/css application/json application/javascript
             text/xml application/xml image/svg+xml application/wasm;

  # Rate limiting zones
  limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
  limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
  limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

  # Upstream servers
  upstream backend {
    server backend:3001;
    keepalive 32;
  }

  upstream frontend {
    server frontend:80;
    keepalive 16;
  }

  # Redirect HTTP → HTTPS
  server {
    listen 80;
    server_name avtohisob.uz www.avtohisob.uz;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # Main HTTPS server
  server {
    listen 443 ssl http2;
    server_name avtohisob.uz www.avtohisob.uz;

    # SSL
    ssl_certificate /etc/letsencrypt/live/avtohisob.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/avtohisob.uz/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:MozSSL:10m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # API proxy
    location /api/ {
      limit_req zone=api burst=20 nodelay;
      limit_conn conn_limit 10;

      proxy_pass http://backend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;
      proxy_read_timeout 120s;
    }

    # Stricter rate limit for login
    location /api/auth/login {
      limit_req zone=login burst=5 nodelay;
      proxy_pass http://backend;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket (Socket.io) — path must match socket.ts `path: '/ws'`
    location /ws/ {
      proxy_pass http://backend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_read_timeout 3600s;
    }

    # File uploads
    location /uploads/ {
      proxy_pass http://backend;
      proxy_set_header Host $host;
      proxy_cache_valid 200 1d;
      add_header Cache-Control "public, max-age=86400";
    }

    # Swagger docs (restrict to admin IPs if needed)
    location /api/docs/ {
      proxy_pass http://backend;
      proxy_set_header Host $host;
    }

    # Frontend (SPA)
    location / {
      proxy_pass http://frontend;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;

      # No cache for HTML
      location ~* \.html$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        proxy_pass http://frontend;
      }
    }
  }
}
