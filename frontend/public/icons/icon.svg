<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f1f5c"/>
      <stop offset="100%" stop-color="#1a56db"/>
    </linearGradient>
    <linearGradient id="truckGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#cbd5e1"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>

  <!-- Subtle top glow -->
  <ellipse cx="256" cy="80" rx="220" ry="70" fill="#3b82f6" opacity="0.15"/>

  <!-- ═══ TRUCK ═══ -->
  <!-- Cargo body -->
  <rect x="68" y="238" width="248" height="118" rx="12" fill="url(#truckGrad)" filter="url(#shadow)"/>

  <!-- Cargo ribbing lines -->
  <line x1="148" y1="244" x2="148" y2="350" stroke="#94a3b8" stroke-width="2" opacity="0.5"/>
  <line x1="228" y1="244" x2="228" y2="350" stroke="#94a3b8" stroke-width="2" opacity="0.5"/>

  <!-- Cab body -->
  <rect x="316" y="264" width="132" height="92" rx="14" fill="url(#truckGrad)" filter="url(#shadow)"/>

  <!-- Cab windshield -->
  <rect x="328" y="276" width="72" height="52" rx="8" fill="#60a5fa" opacity="0.85"/>
  <!-- Windshield glare -->
  <line x1="334" y1="280" x2="346" y2="310" stroke="white" stroke-width="3" opacity="0.4" stroke-linecap="round"/>

  <!-- Cab-cargo connector -->
  <rect x="302" y="268" width="22" height="78" rx="4" fill="#e2e8f0"/>

  <!-- Orange accent stripe top -->
  <rect x="68" y="234" width="380" height="12" rx="6" fill="url(#accentGrad)" filter="url(#shadow)"/>

  <!-- Cab top lights bar -->
  <rect x="322" y="258" width="120" height="10" rx="5" fill="url(#accentGrad)"/>

  <!-- Headlights -->
  <rect x="440" y="288" width="22" height="14" rx="4" fill="#fef3c7"/>
  <rect x="440" y="308" width="22" height="10" rx="3" fill="#fed7aa" opacity="0.8"/>

  <!-- Wheels -->
  <!-- Front wheel -->
  <circle cx="390" cy="380" r="46" fill="#1e293b" filter="url(#shadow)"/>
  <circle cx="390" cy="380" r="32" fill="#334155"/>
  <circle cx="390" cy="380" r="16" fill="#64748b"/>
  <circle cx="390" cy="380" r="6" fill="#94a3b8"/>
  <!-- Front wheel bolts -->
  <circle cx="390" cy="356" r="4" fill="#94a3b8"/>
  <circle cx="390" cy="404" r="4" fill="#94a3b8"/>
  <circle cx="366" cy="380" r="4" fill="#94a3b8"/>
  <circle cx="414" cy="380" r="4" fill="#94a3b8"/>

  <!-- Rear wheel 1 -->
  <circle cx="188" cy="380" r="46" fill="#1e293b" filter="url(#shadow)"/>
  <circle cx="188" cy="380" r="32" fill="#334155"/>
  <circle cx="188" cy="380" r="16" fill="#64748b"/>
  <circle cx="188" cy="380" r="6" fill="#94a3b8"/>
  <circle cx="188" cy="356" r="4" fill="#94a3b8"/>
  <circle cx="188" cy="404" r="4" fill="#94a3b8"/>
  <circle cx="164" cy="380" r="4" fill="#94a3b8"/>
  <circle cx="212" cy="380" r="4" fill="#94a3b8"/>

  <!-- Rear wheel 2 -->
  <circle cx="114" cy="380" r="40" fill="#1e293b" filter="url(#shadow)"/>
  <circle cx="114" cy="380" r="28" fill="#334155"/>
  <circle cx="114" cy="380" r="14" fill="#64748b"/>
  <circle cx="114" cy="380" r="5" fill="#94a3b8"/>

  <!-- Road / ground line -->
  <rect x="50" y="428" width="412" height="5" rx="2.5" fill="white" opacity="0.12"/>
  <rect x="180" y="428" width="60" height="5" rx="2.5" fill="white" opacity="0.25"/>
  <rect x="300" y="428" width="60" height="5" rx="2.5" fill="white" opacity="0.25"/>

  <!-- ═══ AH Monogram ═══ -->
  <!-- AH letters top area -->
  <text x="256" y="196"
        font-family="'Arial Black', 'Arial', sans-serif"
        font-size="112"
        font-weight="900"
        fill="white"
        text-anchor="middle"
        letter-spacing="-4"
        opacity="0.97">AH</text>

  <!-- Underline accent under AH -->
  <rect x="156" y="205" width="200" height="5" rx="2.5" fill="url(#accentGrad)" opacity="0.8"/>

  <!-- Bottom brand text -->
  <text x="256" y="476"
        font-family="Arial, sans-serif"
        font-size="34"
        font-weight="700"
        fill="#93c5fd"
        text-anchor="middle"
        letter-spacing="6"
        opacity="0.85">AVTOHISOB</text>
</svg>
